<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A Trello-style Kanban board with drag & drop, built in vanilla JS." />
  <title>Kanban Board</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__logo" aria-hidden="true">🗂️</span>
      <h1>Kanban Board</h1>
    </div>

    <div class="app-header__tools">
      <div class="search">
        <span class="search__icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          id="search-input"
          class="search__input"
          placeholder="Search cards…"
          aria-label="Search cards across all columns"
          autocomplete="off"
        />
      </div>

      <button id="add-column-btn" class="btn btn--primary" type="button">
        <span aria-hidden="true">＋</span> Column
      </button>

      <div class="menu">
        <button id="menu-btn" class="btn btn--ghost" type="button" aria-haspopup="true" aria-expanded="false" aria-label="More options">⋯</button>
        <div id="menu-dropdown" class="menu__dropdown" role="menu" hidden>
          <button class="menu__item" type="button" data-action="export" role="menuitem">⬇️ Export board (JSON)</button>
          <button class="menu__item" type="button" data-action="import" role="menuitem">⬆️ Import board (JSON)</button>
          <button class="menu__item" type="button" data-action="theme" role="menuitem">🌓 Toggle theme</button>
          <button class="menu__item menu__item--danger" type="button" data-action="reset" role="menuitem">🗑️ Reset board</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div id="board" class="board" aria-label="Kanban board columns"></div>
  </main>

  <!-- Hidden file input for JSON import -->
  <input type="file" id="import-file" accept="application/json,.json" hidden />

  <!-- Templates -->
  <template id="tpl-column">
    <section class="column" data-column-id="">
      <header class="column__header">
        <div class="column__title-wrap">
          <h2 class="column__title" tabindex="0" role="textbox" aria-label="Column title, double-click to edit"></h2>
          <span class="column__count" aria-label="Card count">0</span>
        </div>
        <div class="column__actions">
          <button class="icon-btn column__add" type="button" title="Add a card" aria-label="Add a card">＋</button>
          <button class="icon-btn column__delete" type="button" title="Delete column" aria-label="Delete column">🗑️</button>
        </div>
      </header>
      <div class="column__cards" data-dropzone="true" aria-label="Cards"></div>
      <div class="column__add-card">
        <textarea class="column__add-card-input" rows="2" placeholder="Enter a title for this card…" aria-label="New card text" hidden></textarea>
        <div class="column__add-card-actions" hidden>
          <button class="btn btn--primary btn--sm column__add-card-confirm" type="button">Add card</button>
          <button class="icon-btn column__add-card-cancel" type="button" aria-label="Cancel">✕</button>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-card">
    <article class="card" draggable="true" data-card-id="" tabindex="0">
      <span class="card__label" hidden></span>
      <p class="card__text"></p>
      <div class="card__meta">
        <span class="card__due" hidden></span>
      </div>
      <div class="card__toolbar">
        <button class="icon-btn icon-btn--mini card__edit" type="button" title="Edit" aria-label="Edit card">✏️</button>
        <button class="icon-btn icon-btn--mini card__move" type="button" title="Move to column" aria-label="Move card to another column">↔</button>
        <button class="icon-btn icon-btn--mini card__delete" type="button" title="Delete" aria-label="Delete card">🗑️</button>
      </div>
    </article>
  </template>

  <!-- Card editor dialog -->
  <dialog id="card-dialog" class="dialog">
    <form method="dialog" class="dialog__form" id="card-form">
      <h3 class="dialog__title">Edit card</h3>

      <label class="field">
        <span class="field__label">Text</span>
        <textarea id="card-text" class="field__input" rows="3" required></textarea>
      </label>

      <label class="field">
        <span class="field__label">Label color</span>
        <div class="label-swatches" id="label-swatches"></div>
      </label>

      <label class="field">
        <span class="field__label">Due date</span>
        <input type="date" id="card-due" class="field__input" />
      </label>

      <div class="dialog__actions">
        <button type="button" class="btn btn--ghost" id="card-cancel">Cancel</button>
        <button type="submit" class="btn btn--primary" id="card-save">Save</button>
      </div>
    </form>
  </dialog>

  <!-- Move-to dialog (mobile fallback for drag & drop) -->
  <dialog id="move-dialog" class="dialog">
    <div class="dialog__form">
      <h3 class="dialog__title">Move card to…</h3>
      <div class="move-options" id="move-options"></div>
      <div class="dialog__actions">
        <button type="button" class="btn btn--ghost" id="move-cancel">Cancel</button>
      </div>
    </div>
  </dialog>

  <!-- Toast container -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <!-- Modules: load order matters (shared namespace, no bundler) -->
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/dragdrop.js"></script>
  <script src="js/events.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
